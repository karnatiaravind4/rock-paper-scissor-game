<html>
    <head>
        <title>game</title>
    </head>
    <body>
        <p class="p">Rock paper sciccors</p>
        <button onclick="playgame
        ('rock');" class="rock">
        <img src="images/rock.png" class="rock-img"></button>

        <button onclick="playgame
        ('paper');" class="paper"><img src="images/paper.png" class="paper-img"></button>

        <button onclick="playgame
        ('scissor');" class="scissor"><img src="images/scissor.png" class="scissor-img"></button>
        <p class="result"></p>
        <p class="moves" class="moves"></p>
        
        <p class="js-result">wons:0 lose:0 tie:0</p>
        <button onclick="
        score.won=0;
        score.lose=0;
        score.tie=0;
        document.querySelector('.js-result').innerHTML=
        `wons:${score.won} lose:${score.lose} tie:${score.tie}`;
        document.querySelector('.matter').innerHTML=`your game is reset it will start again`" class="button-reset">Reset</button>
        <p class="matter"></p>
   
        <script>
            const score={
                won:0,
                lose:0,
                tie:0
                
            };
            function playgame(playermove){
                document.querySelector('.matter').innerHTML='';
                let computermove=pickcomputermove();
                let result="";
                if(playermove==='scissor'){
                if(computermove==='rock'){
                result='You lose';}
                else if(computermove==='paper'){
                    result='You won';
                }
                else if(computermove==='scissor'){
                result='Tie';
                }
            }else if(playermove==='paper'){
                if(computermove==='rock'){
                    result='You won';
                }
                else if(computermove==='scissor'){
                    result='You lose';}
                else if(computermove==='paper'){
                    result='Tie';
                
                }
            }else if(playermove==='rock'){
                if(computermove==='scissor'){
                    result='You won';
                }
                else if(computermove==='paper'){
                    result='You lose';
            
                }
                else if(computermove==='rock'){
                    result='Tie';
                }
            }

            if(result==='You won'){
                score.won++;
            }
            else if(result==='You lose'){
                score.lose++;
            }
            else if(result==='Tie'){
                score.tie++;
            }
             document.querySelector('.js-result').innerHTML=`wons:${score.won} lose:${score.lose} tie:${score.tie}` ;
             document.querySelector('.result').innerHTML=`Result: ${result}`;
            document.querySelector('.moves').innerHTML=`<img src="images/${playermove}.png" class="player"><span class="you">you</span><img src="images/${computermove}.png" class="computer"><span class="computertext">computer</span>`;
           
            }
        
        function pickcomputermove(){
            const randomnumber=Math.random();
            let computermove='';
            if(randomnumber>=0 && randomnumber<=1/3){
                computermove='rock';
            }
            else if(randomnumber>=1/3 && randomnumber<=2/3){
                computermove='paper';
            }
            else if(randomnumber>=2/3 && randomnumber<1){
                computermove='scissor';
            }
            return computermove;
        }
        </script>
    <style>
        .result{
            font-weight:bold;
            font-size:25px;
        }
        .you{
            font-weight:bold;
            font-size:25px;
        }
        .computertext{
            font-weight:bold;
            font-size:25px;
        }
    .p{
        font-weight:bold;
        font-size:40px;
    }
    .js-result{
        font-weight:bold;
        font-size:20px;
    }
        .rock-img{
            height:50px;
            border:transparent;
            border-radius:50%;
            height:15%;
            background-color: transparent;
        }
        .rock{
            border:transparent;
             border-radius:50%; 
        }
        .paper-img{
            border-radius:50%;
            height:15%;
            border:transparent;
            
        }
        .paper{
            border:transparent;
            border-radius:50%;
        }
        .scissor-img{
            border-radius:50%;
            height:15%;
            border:transparent;

        }
        .rock:hover{
        background-color:orange;
        }
    s    .scissor:hover{
            background-color:orange;
        }
        .paper:hover{
            background-color:orange;
        }
        
        .scissor{
            border:transparent;
            border-radius:50%;
            
        }
        .player{
        border-radius:50%;
            height:10%;
            border:transparent;
            margin-bottom:2%;
            margin-left:-0px;
            
        }
        .you{
            margin-right:10px;
        }
        .computer{
            border-radius:40%;
            height:10%;
            border:transparent;
            margin-bottom:2%;
            padding-left:10%;
        }
        .button-reset{
            margin-top:30px;
            height:50px;
            width:14%;
            border-radius:40%;
            font-size:20px;
            background-color: black;
            color:white;
            
        }
    </style>
    </body>
</html>
